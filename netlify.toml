[build]
  command = "npx astro build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"
  NPM_CONFIG_PRODUCTION = "false"

[[redirects]]
  from  = "/articles"
  to    = "/articles/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-XSS-Protection       = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
```

The key changes are `npx astro build` instead of `astro build`, and `NPM_CONFIG_PRODUCTION = "false"` to force Netlify to install all dependencies.

**Step 2 — Commit and push:**
```
git add netlify.toml
git commit -m "Fix Netlify build: use npx astro build"
git push